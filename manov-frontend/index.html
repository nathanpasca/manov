<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/apple-touch-icon.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="/favicon-32x32.png"
        />

            rel="icon"
            type="image/png"
            sizes="16x16"
            href="/favicon-16x16.png"
        />
        <link rel="manifest" href="/site.webmanifest" />

            content="Manov — Read translated web novels. Free, unlimited chapters."
        />
        <meta name="theme-color" content="#ffffff" />
        <meta name="referrer" content="strict-origin-when-cross-origin" />

        <!-- Default SEO Fallback (overridden by react-helmet-async per route) -->

            name="description"
            content="Manov — Read translated web novels. Free, unlimited chapters. Discover trending novels, manga-inspired stories, and AI-translated content daily."

        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="Manov" />

            property="og:title"
            content="Manov — Read Translated Web Novels"
        />
        <meta
            property="og:description"
            content="Read translated web novels. Free, unlimited chapters. Discover trending stories updated daily."
        />
        <meta
            property="og:image"
            content="https://manov.pascarz.site/og-image.png"
        />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta property="og:url" content="https://manov.pascarz.site" />
        <meta property="og:locale" content="en_US" />

        <!-- Twitter Card (Default Fallback) -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:site" content="@manovnovels" />
        <meta
            name="twitter:title"
            content="Manov — Read Translated Web Novels"
        />
        <meta
            name="twitter:description"
            content="Read translated web novels. Free, unlimited chapters. Discover trending stories updated daily."
        />
        <meta
            name="twitter:image"
            content="https://manov.pascarz.site/og-image.png"
